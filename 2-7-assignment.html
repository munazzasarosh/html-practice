<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIGNMENT</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            flex-direction: row;
            margin: 50px;
            /* width: 100%; */
            gap: 10px;
        }

        .first {
            width: 500px;
            height: 500px;
            background-color: palevioletred;
            border-radius: 20px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .second {
            width: 600px;
            height: 200px;
            background-color: rgb(57, 104, 165);
            border-radius: 20px;

        }

        .third {
            display: flex;
            flex-direction: column;
            width: 300px;
            height: 290px;
            background-color: rgb(30, 110, 84);
            border-radius: 20px;
        }

        .section2 {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        .section3 {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fourth {
            display: flex;
            flex-direction: column;
            background-color: rgb(115, 166, 173);
            border-radius: 20px;
            width: 290px;
            height: 140px;
        }

        h1 {
            color: rgb(183, 212, 53);
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
    </style>
</head>

<body>
    <div>
        <h1>Flex Box</h1>
    </div>
    <div class="container">
        <div class="first"></div>
        <div class="section">
            <div class="second"></div>
            <div class="section2">
                <div class="third"></div>
                <div class="section3">
                    <div class="fourth"></div>
                    <div class="fourth"></div>
                </div>
            </div>
        </div>

    </div>

        <div class="first"></div>
        <div class="section">
            <div class="second"></div>
            <div class="section2">
                <div class="third"></div>
                <div class="section3">
                    <div class="fourth"></div>
                    <div class="fourth"></div>
                </div>
            </div>
        </div>

    </div> -->
</body>

</html>
